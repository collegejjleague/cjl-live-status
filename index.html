<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJL Live Status</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap');

:root{
  --navy-deep:#050710;
  --navy:#0a0e22;
  --navy-mid:#121734;
  --gold:#e8b84b;
  --gold-dark:#a9782e;
  --gold-light:#f5d78a;
  --red:#c22a3e;
  --blue:#1e3f8f;
  --text:#ffffff;
  --muted:#a9b1cf;
  --line:rgba(232,184,75,0.35);
  --shadow-soft:0 4px 16px rgba(0,0,0,0.45);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Barlow',sans-serif;
  background:
    radial-gradient(ellipse 900px 400px at 50% -8%, rgba(232,184,75,0.08), transparent),
    linear-gradient(160deg, var(--navy-deep) 0%, #06081a 55%, var(--navy) 100%);
  color:var(--text);
  min-height:100vh;
  padding:0;
  position:relative;
  overflow-x:hidden;
}

/* thin gold diagonal accent lines, echoing the overlay frame */
.line-accent{
  position:fixed;
  background:var(--line);
  pointer-events:none;
  z-index:0;
}
.la1{width:1px;height:140%;top:-20%;left:6%;transform:rotate(12deg);}
.la2{width:1px;height:140%;top:-20%;right:9%;transform:rotate(-12deg);}
.la3{width:1px;height:90%;top:5%;left:14%;transform:rotate(12deg);opacity:0.6;}
.la4{width:1px;height:90%;top:5%;right:16%;transform:rotate(-12deg);opacity:0.6;}

.diamond{
  position:fixed;width:8px;height:8px;background:var(--gold);
  transform:rotate(45deg);opacity:0.8;z-index:0;
}
.d1{bottom:22px;left:18px;}
.d2{top:50%;left:50%;transform:translate(-50%,-50%) rotate(45deg);width:6px;height:6px;opacity:0.5;}

.wrap{max-width:980px;margin:0 auto;padding:36px 18px 64px;position:relative;z-index:1;}

/* ===== Header crest bar, echoing the top scoreboard strip ===== */
.crest-bar{
  display:flex;align-items:center;justify-content:center;gap:0;
  margin-bottom:12px;
}
.crest{
  background:linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 45%, var(--gold-dark) 100%);
  clip-path: polygon(18% 0%, 82% 0%, 100% 78%, 50% 100%, 0% 78%);
  width:92px;height:74px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(0,0,0,0.5);
  flex-shrink:0;
  position:relative;
  z-index:2;
}
.crest .crest-logo{
  width:63px;height:auto;
  margin-top:-8px;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,0.35));
}

.title-band{
  background:linear-gradient(90deg, transparent, var(--navy-mid) 12%, var(--navy-mid) 88%, transparent);
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
  margin-top:-14px;
  padding:18px 20px 12px;
  text-align:center;
  border-radius:6px;
}
.title-band .title{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:clamp(20px, 5vw, 26px);
  letter-spacing:3.5px;text-transform:uppercase;
}
.title-band .subtitle{
  font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:5px;
}

.tab-nav{
  display:flex;justify-content:center;margin-bottom:26px;
}
.tab-nav-inner{
  display:inline-flex;background:var(--navy-mid);border:1px solid var(--line);
  border-radius:24px;padding:4px;gap:2px;
}
.tab-btn{
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  background:transparent;border:none;color:var(--muted);
  padding:8px 22px;border-radius:20px;cursor:pointer;transition:all 0.2s ease;
}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{
  background:linear-gradient(180deg, var(--gold-light), var(--gold));
  color:var(--navy-deep);
  box-shadow:0 2px 8px rgba(0,0,0,0.35);
}

/* ===== Mat scoreboard bars, matching the bottom bars in the overlay ===== */
.mats{display:flex;flex-direction:column;gap:16px;}

.history-section{display:flex;flex-direction:column;gap:0;}
.history-mat-title{
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:1px;color:var(--gold);margin-bottom:6px;padding-left:4px;
}

.mat-bar{
  display:grid;
  grid-template-columns:auto 1fr auto auto auto 1fr auto;
  align-items:center;
  background:linear-gradient(180deg, var(--navy-mid), var(--navy));
  border:1px solid var(--line);
  border-radius:40px 40px 0 0;
  padding:10px 12px;
  gap:10px;
  box-shadow:var(--shadow-soft);
  transition:opacity 0.3s ease, border-color 0.3s ease;
}
.mat-bar.idle{opacity:0.4;}

.mat-block{display:flex;flex-direction:column;gap:0;}

/* ===== Stalling / penalty pip row ===== */
.mat-meta{
  display:flex;justify-content:space-between;align-items:center;
  padding:0px 22px 8px;
  font-family:'Barlow',sans-serif;
  background:linear-gradient(180deg, var(--navy), var(--navy));
  border:1px solid var(--line);
  border-top:none;
  border-radius:0 0 40px 40px;
  margin-top:-4px;
  box-shadow:0 2px 8px rgba(0,0,0,0.35);
}
.infractions{display:flex;align-items:center;gap:10px;}
.infractions.right{flex-direction:row-reverse;}
.infr-group{display:flex;align-items:center;gap:4px;}
.infr-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.pip-row{display:flex;gap:3px;}
.pip{width:8px;height:8px;border-radius:50%;background:var(--navy-mid);border:1px solid var(--line);}
.pip.on-stall{background:var(--gold);border-color:var(--gold-dark);}
.pip.on-pen{background:var(--red);border-color:#7a1a26;}

/* ===== Match history log ===== */
.match-log{
  margin:0 0 14px;
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(10,14,34,0.5);
  overflow:hidden;
}
.match-log summary{
  cursor:pointer;list-style:none;
  padding:6px 16px;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;justify-content:space-between;
  user-select:none;
}
.match-log summary::-webkit-details-marker{display:none;}
.match-log summary::after{content:'▾';font-size:9px;transition:transform 0.2s ease;}
.match-log[open] summary::after{transform:rotate(180deg);}
.match-log summary .count{color:var(--gold);}

.log-entries{padding:0 16px 10px;}
.log-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:6px 0;border-top:1px solid var(--border, rgba(232,184,75,0.12));
  font-size:12px;gap:10px;
}
.log-row:first-child{border-top:none;}
.log-row .match-tag{color:var(--muted);font-size:10px;flex-shrink:0;min-width:20px;}
.log-row .result-text{flex:1;min-width:0;}
.log-row .result-text b{color:var(--text);}
.log-row .score-at{color:var(--muted);font-size:11px;flex-shrink:0;white-space:nowrap;}
.log-row .result-tag{
  font-size:9px;color:var(--gold);border:1px solid var(--gold-dark);
  padding:1px 6px;border-radius:8px;text-transform:uppercase;letter-spacing:0.5px;
  margin-left:6px;white-space:nowrap;
}

.point-log-toggle{
  font-size:10px;color:var(--muted);cursor:pointer;text-decoration:underline;
  margin-left:8px;flex-shrink:0;
}
.point-log-list{
  margin-top:4px;padding-left:10px;border-left:2px solid var(--line);
  display:none;
}
.point-log-list.show{display:block;}
.point-log-list div{font-size:10.5px;color:var(--muted);padding:1px 0;}
.point-log-list div b{color:var(--text);}

.no-history{padding:10px 16px;font-size:11px;color:var(--muted);font-style:italic;}

.score-circle{
  width:46px;height:46px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;
  color:#fff;border:2px solid rgba(255,255,255,0.3);
  box-shadow:inset 0 2px 4px rgba(255,255,255,0.25), inset 0 -6px 10px rgba(0,0,0,0.35), 0 3px 8px rgba(0,0,0,0.4);
  flex-shrink:0;
  text-shadow:0 1px 2px rgba(0,0,0,0.4);
}

.mat-label-group{display:flex;align-items:center;gap:6px;}
.mode-badge{
  font-family:'Barlow',sans-serif;font-size:7px;font-weight:700;
  color:var(--gold);border:1px solid var(--gold-dark);
  padding:1px 6px;border-radius:8px;letter-spacing:0.5px;text-transform:uppercase;
  white-space:nowrap;
}

.side{min-width:0;}
.side.right{text-align:right;}
.side .name{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:16px;letter-spacing:0.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.side .school{
  font-size:10px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;
  border-bottom:2px solid;display:inline-block;padding-bottom:2px;margin-top:3px;
}
/* underline color is now set inline per-team from the real school color1/color2 */

.timer-badge{
  background:linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
  color:var(--navy-deep);
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;
  padding:10px 18px;border-radius:8px;
  min-width:90px;text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.35);
  flex-shrink:0;
}
.timer-badge-wrapper{
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.timer-info{
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;white-space:nowrap;
}
.mode-badge-under{
  font-family:'Barlow',sans-serif;font-size:7px;font-weight:700;
  color:var(--gold);border:1px solid var(--gold-dark);
  padding:1px 6px;border-radius:8px;letter-spacing:0.5px;text-transform:uppercase;
  white-space:nowrap;
}

.team-score-circle{
  width:56px;height:56px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;
  color:#fff;border:2px solid rgba(255,255,255,0.3);
  box-shadow:inset 0 2px 4px rgba(255,255,255,0.25), inset 0 -6px 10px rgba(0,0,0,0.35), 0 3px 8px rgba(0,0,0,0.4);
  flex-shrink:0;
  text-shadow:0 1px 2px rgba(0,0,0,0.4);
  gap:2px;
}
.team-score-circle .team-name{
  font-size:8px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;opacity:0.9;
}
.team-score-circle .team-pts{
  font-size:22px;font-weight:900;
}

.mat-empty-bar{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--navy);border:1px dashed var(--line);border-radius:40px;
  padding:16px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;
  letter-spacing:2px;text-transform:uppercase;font-size:13px;
}

.unavailable{
  text-align:center;padding:64px 20px;color:var(--muted);
  border:1px dashed var(--line);border-radius:14px;
  background:rgba(19,26,58,0.4);
}
.unavailable .big{font-size:36px;margin-bottom:14px;opacity:0.7;}
.unavailable .msg{font-size:14px;color:var(--text);}
.unavailable .sub{font-size:12px;margin-top:6px;}

/* ===== Bracket tab ===== */
.division-pills{
  display:flex;gap:8px;overflow-x:auto;padding:2px 2px 14px;
  scrollbar-width:none;
}
.division-pills::-webkit-scrollbar{display:none;}
.division-pill{
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;white-space:nowrap;
  background:var(--navy-mid);border:1px solid var(--line);color:var(--muted);
  padding:8px 16px;border-radius:20px;cursor:pointer;transition:all 0.2s ease;
  flex-shrink:0;
}
.division-pill:hover{color:var(--text);}
.division-pill.active{
  background:linear-gradient(180deg, var(--gold-light), var(--gold));
  color:var(--navy-deep);box-shadow:0 2px 8px rgba(0,0,0,0.35);border-color:transparent;
}

.bracket-scroll{
  overflow-x:auto;padding-bottom:10px;
  -webkit-overflow-scrolling:touch;
}
.bracket-rounds{
  display:flex;gap:22px;align-items:stretch;min-width:min-content;
}
.bracket-round{
  display:flex;flex-direction:column;justify-content:space-around;
  gap:14px;min-width:220px;
}
.bracket-round-label{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--gold);
  text-align:center;padding-bottom:8px;border-bottom:1px solid var(--line);
  margin-bottom:2px;
}
.bracket-bout{
  background:linear-gradient(180deg, var(--navy-mid), var(--navy));
  border:1px solid var(--line);border-radius:12px;overflow:hidden;
  box-shadow:var(--shadow-soft);
}
.bracket-bout.complete{border-color:var(--gold-dark);}
.bracket-bout-header{
  font-family:'Barlow',sans-serif;font-size:9px;color:var(--muted);
  letter-spacing:1.5px;text-transform:uppercase;padding:6px 12px 4px;
  background:rgba(0,0,0,0.2);
}
.bracket-team{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 12px;border-top:1px solid rgba(232,184,75,0.12);gap:10px;
}
.bracket-team:first-of-type{border-top:none;}
.bracket-team.winner{background:rgba(232,184,75,0.08);}
.bracket-team-name{
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
  color:var(--muted);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.bracket-team-name.winner{color:var(--text);font-weight:800;}
.bracket-team-name.tbd{color:#555b7a;font-style:italic;font-weight:400;}
.bracket-team-score{
  font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;
  color:var(--text);flex-shrink:0;min-width:20px;text-align:right;
}
.bracket-result-tag{
  font-size:9px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;
  padding:5px 12px;border-top:1px solid rgba(232,184,75,0.12);
}

.bracket-champion{
  background:linear-gradient(135deg, rgba(232,184,75,0.16), rgba(232,184,75,0.04));
  border:1px solid var(--gold-dark);border-radius:14px;
  padding:22px 26px;text-align:center;margin:auto 0;min-width:200px;
}
.bracket-champion .trophy{font-size:30px;margin-bottom:6px;}
.bracket-champion .label{
  font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;
}
.bracket-champion .name{
  font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--gold-light);
}

/* Supermatches: card grid instead of a bracket tree */
.supermatch-grid{
  display:grid;grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));gap:16px;
}
.supermatch-grid .bracket-bout{min-width:0;}

footer{
  text-align:center;margin-top:36px;font-size:10px;color:#4a5384;
  letter-spacing:2px;text-transform:uppercase;
}

@media (max-width:560px){
  /* Let mat-bar and mat-meta's own children become direct grid items of
     mat-block, so the whole card (score circles, team circles, name/school,
     AND stalling/penalty pips) can be laid out as one unified 2-column grid —
     without changing any HTML or touching the desktop layout at all. */
  .mat-block{display:grid;grid-template-columns:1fr auto 1fr;column-gap:8px;}
  .mat-bar, .mat-meta{display:contents;}

  .mat-block{
    grid-template-areas:
      "team1   .     team2"
      "infr1   .     infr2"
      "score1  timer score2"
      "name1   .     name2";
    row-gap:6px;
    padding:14px 14px 12px;
    background:linear-gradient(180deg, var(--navy-mid), var(--navy));
    border:1px solid var(--line);
    border-radius:16px;
    box-shadow:var(--shadow-soft);
  }

  /* mat-bar's 7 children in DOM order: score1, side(name1), team1, timer,
     team2, side(name2, class "right"), score2 */
  .mat-bar > *:nth-child(1){grid-area:score1;}
  .mat-bar > *:nth-child(2){grid-area:name1;margin-top:-3px;}
  .mat-bar > *:nth-child(3){grid-area:team1;}
  .mat-bar > *:nth-child(4){grid-area:timer;}
  .mat-bar > *:nth-child(5){grid-area:team2;}
  .mat-bar > *:nth-child(6){grid-area:name2;margin-top:-3px;}
  .mat-bar > *:nth-child(7){grid-area:score2;}

  /* mat-meta's 2 children: athlete-1 infractions, athlete-2 infractions */
  .mat-meta > *:nth-child(1){grid-area:infr1;}
  .mat-meta > *:nth-child(2){grid-area:infr2;}

  .mat-bar > *, .mat-meta > *{justify-self:center;}
  .side{text-align:center;}
  .side.right{text-align:center;}

  .timer-badge-wrapper{align-self:start;margin-top:2px;}
  .timer-info{font-size:10px;}
  .timer-badge{font-size:18px;min-width:64px;padding:6px 10px;}
  .score-circle{width:40px;height:40px;font-size:17px;}
  .team-score-circle{width:48px;height:48px;}
  .team-score-circle .team-name{font-size:7px;}
  .team-score-circle .team-pts{font-size:18px;}
  .side .name{font-size:13px;}
  .side .school{font-size:9px;}
  .infractions{flex-direction:column;gap:3px;}
  .infractions.right{flex-direction:column;}
  .infr-label{font-size:8px;}
  .pip{width:7px;height:7px;}

  .crest{width:76px;height:62px;}
  .crest .crest-logo{width:52px;margin-top:-6px;}
  .tab-btn{padding:7px 16px;font-size:12px;}

  .bracket-round{min-width:180px;}
  .bracket-champion{min-width:160px;padding:18px 20px;}
}

</style>
</head>
<body>
<div class="line-accent la1"></div>
<div class="line-accent la2"></div>
<div class="line-accent la3"></div>
<div class="line-accent la4"></div>
<div class="diamond d1"></div>

<div class="wrap">

<script>
const RELAY_URL = 'wss://cjl-relay.onrender.com';
const matStates = {1:null, 2:null, 3:null, 4:null};
const lastUpdate = {1:0, 2:0, 3:0, 4:0};
let connectedChannels = 0;
let latestBouts = null; // server-fed match history, shared by every visitor

// If a mat hasn't sent any update (score, timer tick, etc.) in this long,
// assume the control panel got closed / tournament paused and show it as
// idle instead of leaving a stale match frozen on screen indefinitely.
const STALE_MATCH_MS = 90 * 1000; // 90 seconds

function connectMat(matId) {
  const sock = new WebSocket(RELAY_URL);
  sock.onopen = function() {
    sock.send(JSON.stringify({ type: 'join', mat: matId }));
    connectedChannels++;
    updateStatus();
  };
  sock.onmessage = function(e) {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'state') {
        matStates[matId] = d;
        lastUpdate[matId] = Date.now();
        render();
      } else if (d.type === 'sync_state') {
        // Relay replays the last cached state (if still fresh) to newly-joined
        // clients under this type — without handling it, a status page opened
        // mid-match would show "No active match" until the next live update.
        matStates[matId] = d.state;
        lastUpdate[matId] = Date.now();
        render();
      }
    } catch(err) {}
  };
  sock.onclose = function() {
    connectedChannels = Math.max(0, connectedChannels - 1);
    updateStatus();
    setTimeout(function(){ connectMat(matId); }, 5000);
  };
  sock.onerror = function() { sock.close(); };

  setInterval(function() {
    if (sock.readyState === 1) sock.send(JSON.stringify({ type: 'ping' }));
  }, 25000);
}

// Subscribes to the relay's 'history' channel. The relay itself is the only
// thing polling Apps Script for match history — every visitor's browser just
// listens on this one shared WebSocket channel, so it costs nothing extra no
// matter how many people have the page open.
function connectHistory() {
  const sock = new WebSocket(RELAY_URL);
  sock.onopen = function() {
    sock.send(JSON.stringify({ type: 'join', channel: 'history' }));
  };
  sock.onmessage = function(e) {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'history_update') {
        latestBouts = d.bouts;
        renderHistory();
      }
    } catch(err) {}
  };
  sock.onclose = function() {
    setTimeout(connectHistory, 5000);
  };
  sock.onerror = function() { sock.close(); };

  setInterval(function() {
    if (sock.readyState === 1) sock.send(JSON.stringify({ type: 'ping' }));
  }, 25000);
}

// ===== Brackets =====
// Each division's round structure, mirroring the ROUNDS/TITLE/IS_CHAMP config
// baked into the existing standalone bracket overlay files (cjl_bracket_*.html)
// so this tab reads the exact same data those files already do.
const DIVISIONS = [
  { id: 'mens_champ', label: "Men's Championship", isSuper: false, isChamp: true, placeLabel: '1st / 2nd',
    rounds: [
      { label: 'Round 1', bouts: ['Bout 1','Bout 2','Bout 3','Bout 4'] },
      { label: 'Semifinals', bouts: ['Bout 5','Bout 6'] },
      { label: 'Final', bouts: ['Bout 11'] }
    ] },
  { id: 'mens_con', label: "Men's Consolation", isSuper: false, isChamp: false, placeLabel: '3rd / 4th',
    rounds: [
      { label: 'Consolation R1', bouts: ['Bout 7','Bout 8'] },
      { label: 'Consolation R2', bouts: ['Bout 9','Bout 10'] },
      { label: '3rd/4th Place', bouts: ['Bout 12'] }
    ] },
  { id: 'womens_champ', label: "Women's Championship", isSuper: false, isChamp: true, placeLabel: '1st / 2nd',
    rounds: [
      { label: 'Round 1', bouts: ['Bout W1','Bout W2','Bout W3','Bout W4'] },
      { label: 'Semifinals', bouts: ['Bout W5','Bout W6'] },
      { label: 'Final', bouts: ['Bout W11'] }
    ] },
  { id: 'womens_con', label: "Women's Consolation", isSuper: false, isChamp: false, placeLabel: '3rd / 4th',
    rounds: [
      { label: 'Consolation R1', bouts: ['Bout W7','Bout W8'] },
      { label: 'Consolation R2', bouts: ['Bout W9','Bout W10'] },
      { label: '3rd/4th Place', bouts: ['Bout W12'] }
    ] },
  { id: 'supermatches', label: 'Supermatches', isSuper: true, isChamp: false, placeLabel: '', rounds: [] }
];

// Flat array of every bout across every division, exactly as pushed by the
// control panel: [{ bout: 'Bout 1', team1, team2, team1Score, team2Score,
// winner, status }, ...]. No per-division tagging on the wire — each bracket
// view just looks up the bout names it cares about, same as the standalone
// overlay files already do.
let allBouts = [];
let currentDivision = DIVISIONS[0].id;

// Subscribes to the relay's shared 'bracket' channel — the same channel and
// message shape the control panel and the existing bracket overlay files
// already use, so nothing on the sending side needs to change.
function connectBracket() {
  const sock = new WebSocket(RELAY_URL);
  sock.onopen = function() {
    sock.send(JSON.stringify({ type: 'join', channel: 'bracket' }));
  };
  sock.onmessage = function(e) {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'bracket' && d.data) {
        allBouts = d.data;
        renderBrackets();
      }
    } catch(err) {}
  };
  sock.onclose = function() {
    setTimeout(connectBracket, 5000);
  };
  sock.onerror = function() { sock.close(); };

  setInterval(function() {
    if (sock.readyState === 1) sock.send(JSON.stringify({ type: 'ping' }));
  }, 25000);
}

function selectDivision(id) {
  currentDivision = id;
  renderBrackets();
}

function renderDivisionPills() {
  const wrap = document.getElementById('divisionPills');
  wrap.innerHTML = DIVISIONS.map(d =>
    `<button class="division-pill${d.id === currentDivision ? ' active' : ''}" onclick="selectDivision('${d.id}')">${d.label}</button>`
  ).join('');
}

function findBout(name) {
  return allBouts.find(b => b.bout === name);
}

function isTbdTeam(name) {
  return !name || name === 'TBD' || name.startsWith('W-') || name.startsWith('L-');
}

function teamCell(name, score, isWinner, isTbd) {
  return `
    <div class="bracket-team${isWinner ? ' winner' : ''}">
      <span class="bracket-team-name${isWinner ? ' winner' : ''}${isTbd ? ' tbd' : ''}">${isTbd ? 'TBD' : (name || '—')}</span>
      ${score ? `<span class="bracket-team-score">${score}</span>` : ''}
    </div>
  `;
}

function boutCard(boutName) {
  const bout = findBout(boutName);
  const t1 = bout ? bout.team1 : null;
  const t2 = bout ? bout.team2 : null;
  const s1 = bout && bout.team1Score ? bout.team1Score : '';
  const s2 = bout && bout.team2Score ? bout.team2Score : '';
  const w = bout ? bout.winner : '';
  const complete = !!(bout && bout.status === 'Complete');
  return `
    <div class="bracket-bout${complete ? ' complete' : ''}">
      <div class="bracket-bout-header">${boutName}</div>
      ${teamCell(t1, s1, !!w && w === t1, isTbdTeam(t1))}
      ${teamCell(t2, s2, !!w && w === t2, isTbdTeam(t2))}
      ${complete ? `<div class="bracket-result-tag">✓ ${w} wins</div>` : ''}
    </div>
  `;
}

function renderBrackets() {
  renderDivisionPills();
  const container = document.getElementById('bracketContent');
  const div = DIVISIONS.find(d => d.id === currentDivision);

  if (!allBouts.length) {
    container.innerHTML = '<div class="unavailable"><div class="big">⏸</div><div class="msg">No bracket data yet.</div><div class="sub">This bracket will fill in once the tournament starts.</div></div>';
    return;
  }

  if (div.isSuper) {
    container.innerHTML = `<div class="supermatch-grid">${['Super 1','Super 2','Super 3'].map(boutCard).join('')}</div>`;
    return;
  }

  const roundsHtml = div.rounds.map(r => `
    <div class="bracket-round">
      <div class="bracket-round-label">${r.label}</div>
      ${r.bouts.map(boutCard).join('')}
    </div>
  `).join('');

  const finalRound = div.rounds[div.rounds.length - 1];
  const finalBout = finalRound ? findBout(finalRound.bouts[0]) : null;
  let placeHtml = '';
  if (finalBout && finalBout.winner) {
    placeHtml = div.isChamp ? `
      <div class="bracket-champion">
        <div class="trophy">🏆</div>
        <div class="label">Champion</div>
        <div class="name">${finalBout.winner}</div>
      </div>
    ` : `
      <div class="bracket-champion">
        <div class="label">${div.placeLabel}</div>
        <div class="name">${finalBout.winner} wins</div>
      </div>
    `;
  }

  container.innerHTML = `<div class="bracket-scroll"><div class="bracket-rounds">${roundsHtml}${placeHtml}</div></div>`;
}

// This just re-renders mats when a mat channel connects/disconnects.
function updateStatus() {
  render();
}

function render() {
  const mats = document.getElementById('mats');
  const anyLive = Object.values(matStates).some(s => s !== null);
  mats.innerHTML = '';

  if (connectedChannels === 0 && !anyLive) {
    const ua = document.createElement('div');
    ua.className = 'unavailable';
    ua.innerHTML = '<div class="big">⏸</div><div class="msg">Live data is currently unavailable.</div><div class="sub">Check back during an active tournament.</div>';
    mats.appendChild(ua);
    return;
  }

  for (let i = 1; i <= 4; i++) {
    const s = matStates[i];

    if (!s) {
      const bar = document.createElement('div');
      bar.className = 'mat-empty-bar';
      bar.textContent = 'Mat ' + i + ' — No active match';
      mats.appendChild(bar);
      continue;
    }

    const m = Math.floor((s.timerSeconds||0)/60), sec = (s.timerSeconds||0)%60;
    const timerStr = m + ':' + sec.toString().padStart(2,'0');

    const color1 = s.color1 || '#c22a3e';
    const color2 = s.color2 || '#1e3f8f';

    const modeLabels = { mens: "Men's", womens: "Women's", supermatch: 'Supermatch' };
    const modeTotals = { mens: 5, womens: 3, supermatch: 1 };
    const modeLabel = modeLabels[s.mode] || '';
    const total = modeTotals[s.mode] || '';
    const matchOf = s.matchNum && total ? `Match ${s.matchNum} of ${total}` : (s.matchNum ? `Match ${s.matchNum}` : '');

    const block = document.createElement('div');
    block.className = 'mat-block';

    block.innerHTML = `
      <div class="mat-bar">
        <div class="score-circle" style="background:var(--red);">${s.pts1||0}</div>
        <div class="side">
          <div class="name">${s.name1||'—'}</div>
          <div class="school" style="border-bottom-color:${color1};">${s.school1||''}</div>
        </div>
        <div class="team-score-circle" style="background:${color1};"><div class="team-name">${s.school1||'Team'}</div><div class="team-pts">${s.teamPts1??0}</div></div>
        <div class="timer-badge-wrapper">
          <div class="timer-info">Mat ${i}${matchOf ? ' · ' + matchOf : ''}</div>
          <div class="timer-badge">${timerStr}</div>
          ${modeLabel ? `<div class="mode-badge-under">${modeLabel}</div>` : ''}
        </div>
        <div class="team-score-circle" style="background:${color2};"><div class="team-name">${s.school2||'Team'}</div><div class="team-pts">${s.teamPts2??0}</div></div>
        <div class="side right">
          <div class="name">${s.name2||'—'}</div>
          <div class="school" style="border-bottom-color:${color2};">${s.school2||''}</div>
        </div>
        <div class="score-circle" style="background:var(--blue);">${s.pts2||0}</div>
      </div>
      <div class="mat-meta">
        ${infractionGroup(s.stalling1||0, s.penalties1||0)}
        ${infractionGroup(s.stalling2||0, s.penalties2||0, true)}
      </div>
    `;
    mats.appendChild(block);
  }
}

function pipRow(count, cls){
  let html = '';
  for (let p = 1; p <= 4; p++) html += `<span class="pip${p<=count ? ' '+cls : ''}"></span>`;
  return `<div class="pip-row">${html}</div>`;
}

function infractionGroup(stalling, penalties, right){
  return `
    <div class="infractions${right ? ' right' : ''}">
      <div class="infr-group"><span class="infr-label">Stall</span>${pipRow(stalling, 'on-stall')}</div>
      <div class="infr-group"><span class="infr-label">Pen</span>${pipRow(penalties, 'on-pen')}</div>
    </div>
  `;
}

function renderHistory(){
  const historyMats = document.getElementById('historyMats');
  historyMats.innerHTML = '';

  if (!Array.isArray(latestBouts) || latestBouts.length === 0) {
    historyMats.innerHTML = '<div class="unavailable"><div class="big">⏸</div><div class="msg">No match history yet.</div><div class="sub">History fills in as bouts are completed and submitted.</div></div>';
    return;
  }

  // Most recently updated / highest bout number first is usually most relevant;
  // simple stable order by boutNum string is fine since bout IDs are assigned in order.
  const bouts = latestBouts.slice();

  bouts.forEach(b => {
    const section = document.createElement('div');
    section.className = 'history-section';
    const scoreStr = (b.teamPts1 !== '' && b.teamPts2 !== '') ? ` — ${b.teamPts1}–${b.teamPts2}` : '';
    const statusTag = b.status ? ` <span class="result-tag">${b.status}</span>` : '';
    const title = `${b.boutNum ? b.boutNum + ': ' : ''}${b.school1||'—'} vs ${b.school2||'—'}${scoreStr}${statusTag}`;
    section.innerHTML = `<div class="history-mat-title">${title}</div>${matchHistoryHtml(b.boutNum, b.matches)}`;
    historyMats.appendChild(section);
  });
}

function switchTab(tab){
  const liveBtn = document.getElementById('tabLiveBtn');
  const historyBtn = document.getElementById('tabHistoryBtn');
  const bracketsBtn = document.getElementById('tabBracketsBtn');
  const mats = document.getElementById('mats');
  const historyMats = document.getElementById('historyMats');
  const bracketsView = document.getElementById('bracketsView');

  liveBtn.classList.remove('active');
  historyBtn.classList.remove('active');
  bracketsBtn.classList.remove('active');
  mats.style.display = 'none';
  historyMats.style.display = 'none';
  bracketsView.style.display = 'none';

  if (tab === 'live') {
    liveBtn.classList.add('active');
    mats.style.display = 'flex';
  } else if (tab === 'history') {
    historyBtn.classList.add('active');
    historyMats.style.display = 'flex';
    renderHistory();
  } else {
    bracketsBtn.classList.add('active');
    bracketsView.style.display = 'flex';
    renderBrackets();
  }
}

function matchHistoryHtml(boutId, matches){
  if (!Array.isArray(matches) || matches.length === 0) {
    return `<details class="match-log"><summary>Match History <span class="count">0</span></summary><div class="no-history">No matches completed yet in this bout.</div></details>`;
  }
  const rows = matches.map((r, idx) => {
    const logId = 'pl-' + boutId + '-' + idx;
    const hasPoints = Array.isArray(r.pointLog) && r.pointLog.length > 0;
    const pointsHtml = hasPoints ? r.pointLog.map(p => {
      const who = p.athlete === 1 ? r.winner || 'Athlete 1' : r.loser || 'Athlete 2';
      const ptsStr = p.pts ? ' (' + (p.pts > 0 ? '+' : '') + p.pts + ')' : '';
      return `<div><b>${p.clock||''}</b> — ${who}: ${p.label||''}${ptsStr}</div>`;
    }).join('') : '';
    return `
      <div class="log-row">
        <span class="match-tag">M${r.matchNum}</span>
        <span class="result-text"><b>${r.winner||'—'}</b> def. ${r.loser||'—'}
          <span class="result-tag">${r.result||''}</span>
          ${hasPoints ? `<span class="point-log-toggle" onclick="const el=document.getElementById('${logId}');el.classList.toggle('show');">details</span>` : ''}
          ${hasPoints ? `<div class="point-log-list" id="${logId}">${pointsHtml}</div>` : ''}
        </span>
      </div>
    `;
  }).join('');
  return `<details class="match-log"><summary>Match History <span class="count">${matches.length}</span></summary><div class="log-entries">${rows}</div></details>`;
}

for (let i = 1; i <= 4; i++) connectMat(i);
connectHistory();
connectBracket();
renderDivisionPills();

// Periodic sweep: clear any mat whose last update is older than STALE_MATCH_MS.
setInterval(function() {
  let changed = false;
  for (let i = 1; i <= 4; i++) {
    if (matStates[i] !== null && Date.now() - lastUpdate[i] > STALE_MATCH_MS) {
      matStates[i] = null;
      changed = true;
    }
  }
  if (changed) render();
}, 10000);
updateStatus();
</script>
